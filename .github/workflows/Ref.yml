name: Only for ref - no build

on:
  push:
    branches: [ "main" ]
    # Also trigger on version tags (e.g., v1.0.0)
    tags: [ 'v*.*.*' ]

env:
  REGISTRY: ghcr.io
  # Converts your repo name to lowercase automatically (required for GHCR)
  IMAGE_NAME: ${{ github.repository_owner }}/sentinel/sentinel-ollama-llama3

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Required for generating provenance (Supply Chain Security)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. The Magic Metadata Step
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Always output the 'latest' tag on the main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Output a tag with the short Git SHA (e.g., sha-ad1f5a9)
            type=sha,format=short
            # Output a tag based on the Git Tag (if pushed)
            type=ref,event=tag

      # 2. Build and Push with Lineage
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Assuming your dockerfile is at the root. Adjust if it is in a subfolder.
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enables SLSA provenance tracking (Enterprise-grade tracking)
          provenance: true
